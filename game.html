  <style>
    :root {
      --bg-primary: #0f1117;
      --bg-secondary: #161b26;
      --bg-card: #1c2333;
      --bg-card-hover: #222d42;
      --accent: #4fc3f7;
      --accent-glow: rgba(79, 195, 247, 0.25);
      --accent-2: #f06292;
      --text-primary: #e8eaf0;
      --text-secondary: #8b9ab5;
      --text-muted: #4a5568;
      --border: rgba(255,255,255,0.07);
      --border-accent: rgba(79, 195, 247, 0.3);
      --cat-жарыс: #ff6b35;
      --cat-атыс: #e53935;
      --cat-басқату: #7c4dff;
      --cat-спорт: #43a047;
      --cat-қорқынышты: #6a1b9a;
      --cat-аркада: #f9a825;
      --radius: 10px;
      --radius-lg: 16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 17, 23, 0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      font-family: 'Rajdhani', sans-serif;
      font-size: 28px;
      font-weight: 700;
      text-decoration: none;
      color: var(--text-primary);
      letter-spacing: 2px;
    }

    .logo span { color: var(--accent); }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      transition: all 0.2s;
      margin-left: auto;
    }

    .back-btn:hover {
      color: var(--text-primary);
      border-color: var(--border-accent);
    }

    /* MAIN LAYOUT */
    .page-wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    /* BREADCRUMB */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .breadcrumb a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .breadcrumb a:hover { color: var(--accent); }
    .breadcrumb span { color: var(--text-secondary); }

    /* GAME LAYOUT: embed left, info right on desktop */
    .game-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      align-items: start;
    }

    /* GAME EMBED BLOCK */
    .embed-section {}

    .game-title-main {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(22px, 3vw, 34px);
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    /* IFRAME WRAPPER */
    .iframe-wrapper {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .iframe-wrapper iframe {
      display: block;
      width: 100%;
      height: 540px;
      border: none;
    }

    /* MOBILE PLAY GATE */
    .mobile-gate {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px 20px;
      text-align: center;
      min-height: 260px;
    }

    .mobile-gate-icon { font-size: 56px; }

    .mobile-gate-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
    }

    .mobile-gate-sub {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .play-now-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #0f1117;
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 14px 36px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 24px var(--accent-glow);
    }

    .play-now-btn:hover {
      transform: scale(1.04);
      box-shadow: 0 0 36px var(--accent-glow);
    }

    /* FULLSCREEN OVERLAY (mobile) */
    .fullscreen-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: #000;
      flex-direction: column;
    }

    .fullscreen-overlay.active { display: flex; }

    .overlay-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: rgba(0,0,0,0.8);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .overlay-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .close-overlay-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 20px;
      width: 36px;
      height: 36px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .overlay-iframe {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
    }

    /* ATTRIBUTION */
    .game-credit {
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
      color: var(--text-muted);
    }

    .game-credit a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .game-credit a:hover { color: var(--accent); }

    /* SIDEBAR */
    .sidebar {}

    .info-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 16px;
    }

    .info-card-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .cat-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      border: 1px solid;
    }

    .game-description {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    .tags-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .desktop-play-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: var(--accent);
      color: #0f1117;
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 20px var(--accent-glow);
      text-decoration: none;
      margin-top: 4px;
    }

    .desktop-play-btn:hover {
      box-shadow: 0 0 36px var(--accent-glow);
      transform: translateY(-1px);
    }

    /* RELATED GAMES */
    .related-section {
      margin-top: 40px;
    }

    .related-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }

    .related-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform 0.2s, border-color 0.2s;
    }

    .related-card:hover {
      transform: translateY(-3px);
      border-color: var(--border-accent);
    }

    .related-thumb {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: var(--bg-secondary);
      position: relative;
      overflow: hidden;
    }

    .related-thumb img { width: 100%; height: 100%; object-fit: contain; }

    .related-placeholder {
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      background: var(--bg-secondary);
    }

    .related-body { padding: 10px 12px; }

    .fs-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(15, 17, 23, 0.85);
      backdrop-filter: blur(5px);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 6px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      z-index: 10;
      transition: all 0.2s;
    }
    
    .fs-btn:hover {
      background: var(--accent);
      color: #0f1117;
      border-color: var(--accent);
    }

    .related-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 600;
    }

    /* LOADING */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      flex-direction: column;
      gap: 16px;
      color: var(--text-muted);
    }

    .loader {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* NOT FOUND */
    .not-found {
      display: none;
      text-align: center;
      padding: 80px 20px;
    }

    .not-found.visible { display: block; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .game-layout {
        grid-template-columns: 1fr;
      }

      .sidebar { order: -1; }

      .desktop-play-btn { display: none; }

      /* On mobile, hide desktop iframe, show gate */
      .iframe-wrapper iframe { display: none; }
      .mobile-gate { display: flex; }
    }

    @media (max-width: 480px) {
      .page-wrap { padding: 16px 12px 40px; }
      .related-grid { grid-template-columns: 1fr 1fr; }
    }

    /* Cat colors */
    [data-cat="жарыс"] { color: #ff6b35; border-color: #ff6b35; background: rgba(255,107,53,0.1); }
    [data-cat="атыс"] { color: #e53935; border-color: #e53935; background: rgba(229,57,53,0.1); }
    [data-cat="басқату"] { color: #7c4dff; border-color: #7c4dff; background: rgba(124,77,255,0.1); }
    [data-cat="спорт"] { color: #43a047; border-color: #43a047; background: rgba(67,160,71,0.1); }
    [data-cat="қорқынышты"] { color: #6a1b9a; border-color: #6a1b9a; background: rgba(106,27,154,0.1); }
    [data-cat="аркада"] { color: #f9a825; border-color: #f9a825; background: rgba(249,168,37,0.1); }
    [data-cat="қыздарға"] { color: #e91e8c; border-color: #e91e8c; background: rgba(233,30,140,0.1); }
    [data-cat="ұлдарға"] { color: #1e88e5; border-color: #1e88e5; background: rgba(30,136,229,0.1); }
    [data-cat="екеуіне"] { color: #00acc1; border-color: #00acc1; background: rgba(0,172,193,0.1); }
  </style>

<script>
const CATEGORY_EMOJIS = {
  'жарыс': '', 'атыс': '', 'басқату': '',
  'спорт': '', 'қорқынышты': '', 'аркада': '',
  'қыздарға': '', 'ұлдарға': '', 'екеуіне': ''
};
const CATEGORY_NAMES = {
  'жарыс': 'Жарыс', 'атыс': 'Атыс', 'басқату': 'Басқату',
  'спорт': 'Спорт', 'қорқынышты': 'Қорқынышты', 'аркада': 'Аркада',
  'қыздарға': 'Қыздарға арналған', 'ұлдарға': 'Ұлдарға арналған', 'екеуіне': 'Екеуіне арналған'
};


const params = new URLSearchParams(window.location.search);
const gameId = params.get('id');

async function init() {
  if (!gameId) { showNotFound(); return; }
  
  try {
    // Загружаем данные из твоего файла
    const response = await fetch('data/games.json');
    const GAMES_DATA = await response.json();
    
    // Ищем игру по ID
    const game = GAMES_DATA.find(g => g.id === gameId);
    if (!game) { showNotFound(); return; }
    
    // Отрисовываем
    renderGame(game, GAMES_DATA);
    injectSchema(game);
  } catch (error) {
    console.error('Ошибка загрузки игр:', error);
    showNotFound();
  }
}

function showNotFound() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('notFound').classList.add('visible');
}

function renderGame(game, allGames) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('gamePage').style.display = 'block';

  // SEO meta
  document.getElementById('pageTitle').textContent = `${game.title_kz} — OyinBar`;
  document.title = `${game.title_kz} — OyinBar`;
  document.getElementById('metaDesc').content = game.description_kz;
  document.getElementById('ogTitle').content = `${game.title_kz} — OyinBar`;
  document.getElementById('ogDesc').content = game.description_kz;
  document.getElementById('canonicalUrl').href = `https://oyinbar.space/game.html?id=${game.id}`;

  // Breadcrumb
  const catLink = document.getElementById('breadCat');
  catLink.textContent = CATEGORY_NAMES[game.category] || game.category;
  catLink.href = `/?cat=${game.category}`;
  document.getElementById('breadTitle').textContent = game.title_kz;

  // Title
  document.getElementById('gameTitle').textContent = game.title_kz;

  // Iframe (desktop)
  document.getElementById('gameIframe').src = game.embed_url;

  // Source link
  const srcLink = document.getElementById('gameSourceLink');
  srcLink.href = game.source_url;
  srcLink.textContent = `${game.title_kz} ойынын ашу`;

  // Mobile gate
  document.getElementById('mobileGateTitle').textContent = game.title_kz;

  // Description & category
  const catBadge = document.getElementById('catBadge');
  catBadge.dataset.cat = game.category;
  catBadge.textContent = CATEGORY_NAMES[game.category] || game.category;
  document.getElementById('gameDesc').textContent = game.description_kz;

  // Tags
  const tagsWrap = document.getElementById('tagsWrap');
  tagsWrap.innerHTML = game.tags.map(t => `<span class="tag">#${t}</span>`).join('');

  // Desktop play link (scroll to iframe)
  document.getElementById('desktopPlayLink').addEventListener('click', e => {
    e.preventDefault();
    document.getElementById('iframeWrapper').scrollIntoView({ behavior: 'smooth', block: 'center' });
  });

  // Mobile fullscreen
  const overlay = document.getElementById('fullscreenOverlay');
  document.getElementById('overlayTitle').textContent = game.title_kz;
  document.getElementById('mobilePlayBtn').addEventListener('click', () => {
    document.getElementById('overlayIframe').src = game.embed_url;
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  });

  document.getElementById('closeOverlay').addEventListener('click', () => {
    overlay.classList.remove('active');
    document.getElementById('overlayIframe').src = '';
    document.body.style.overflow = '';
  });

  // Related games (same category, exclude current)
  const related = allGames.filter(g => g.category === game.category && g.id !== game.id).slice(0, 4);
  const relatedGrid = document.getElementById('relatedGrid');

  if (related.length > 0) {
    relatedGrid.innerHTML = related.map(g => `
      <a href="game.html?id=${g.id}" class="related-card">
        <div class="related-thumb">
          <img src="${g.thumbnail}" alt="${g.title_kz}" loading="lazy"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
          <div class="related-placeholder"></div>
        </div>
        <div class="related-body">
          <div class="related-name">${g.title_kz}</div>
        </div>
      </a>
    `).join('');
  } else {
    document.getElementById('relatedSection').style.display = 'none';
  }
}

function injectSchema(game) {
  const schema = {
    "@context": "https://schema.org",
    "@type": "VideoGame",
    "name": game.title_kz,
    "description": game.description_kz,
    "genre": CATEGORY_NAMES[game.category] || game.category,
    "url": `https://oyinbar.space/game.html?id=${game.id}`,
    "inLanguage": "kk",
    "publisher": { "@type": "Organization", "name": "OyinBar" },
    "datePublished": game.date_added,
    "keywords": game.tags.join(', ')
  };
  const s = document.createElement('script');
  s.type = 'application/ld+json';
  s.textContent = JSON.stringify(schema);
  document.head.appendChild(s);
}
