<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Бет табылмады | OyinBar</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Noto+Sans+KR:wght@400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1117;
      --accent: #4fc3f7;
      --accent-glow: rgba(79,195,247,0.2);
      --text: #e8eaf0;
      --muted: #4a5568;
      --border: rgba(255,255,255,0.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0 20px;
      height: 64px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: rgba(15,17,23,0.95);
    }
    .logo {
      font-family: 'Rajdhani', sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 2px;
      text-decoration: none;
      color: var(--text);
    }
    .logo span { color: var(--accent); }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .code {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(80px, 20vw, 160px);
      font-weight: 700;
      line-height: 1;
      color: var(--accent);
      text-shadow: 0 0 60px var(--accent-glow);
      letter-spacing: -4px;
    }
    .title {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(20px, 4vw, 32px);
      font-weight: 600;
      margin: 16px 0 12px;
      letter-spacing: 1px;
    }
    .sub {
      font-size: 15px;
      color: var(--muted);
      max-width: 380px;
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .btns {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #0f1117;
      font-family: 'Rajdhani', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 13px 32px;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 36px var(--accent-glow);
    }
    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 13px 32px;
      border-radius: 8px;
      text-decoration: none;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      border-color: rgba(79,195,247,0.3);
      background: rgba(79,195,247,0.05);
    }
    footer {
      padding: 20px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">OYIN<span>BAR</span></a>
  </header>
  <main class="main">
    <div class="code">404</div>
    <h1 class="title">Бет табылмады</h1>
    <p class="sub">Сіз іздеген бет жоқ немесе жойылған. Басты бетке оралып, ойын таңдаңыз!</p>
    <div class="btns">
      <a href="/" class="btn-primary">▶ Ойындарға оралу</a>
      <a href="javascript:history.back()" class="btn-secondary">← Артқа</a>
    </div>
  </main>
  <footer>© 2026 OyinBar — Тегін онлайн ойындар порталы</footer>
</body>
</html>
